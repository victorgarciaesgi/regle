packages:
  - packages/core
  - packages/rules
  - packages/schemas
  - packages/nuxt
  - packages/nuxt/test/fixtures
  - packages/shared
  - packages/mcp-server
  - packages-private/regle-playground
  - tests
  - tests/regle-plugin-config-tests
  - docs
  - playground/vue3
  - playground/nuxt
  - playground/advanced-example
  - ui-tests/fixtures/ui-vue3

minimumReleaseAge: 1440 # 24 hours
minimumReleaseAgeExclude:
  - tsdown
  - 'oxlint'
  - '@oxlint*'
  - 'oxfmt*'
  - '@typescript/native-preview*'

