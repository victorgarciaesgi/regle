name: Install Node.js
description: Set up Node.js with pnpm via Corepack and configure dependency cache

runs:
  using: composite
  steps:
    - name: Set up pnpm
      uses: pnpm/action-setup@v6
      with:
        version: 11.1.2
        run_install: false

    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version-file: .node-version

    - name: Enable Corepack
      run: corepack enable
      shell: bash
