name: build-test
on:
  push:
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".github/**"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".github/**"
  pull_request_review:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/install-node
      - run: pnpm i --frozen-lockfile
      - run: pnpm exec playwright install --with-deps
      - run: pnpm build
      - run: pnpm run lint:github
      - run: pnpm run test
        env:
          CI: true
